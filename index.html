<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Document Quiz Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        /* Google Forms Aesthetic Variables */
        :root { 
            --google-purple: rgb(103, 58, 183);
            --bg-color: rgb(240, 235, 248);
            --card-bg: #FFFFFF; 
            --text-main: #202124; 
            --text-secondary: #5f6368;
            --border-color: #dadce0;
        }
        
        body { 
            font-family: 'Roboto', Arial, sans-serif; 
            background: var(--bg-color); 
            color: var(--text-main); 
            padding: 20px; 
            display: flex; 
            justify-content: center; 
            line-height: 1.5;
            margin: 0;
        }
        
        .container { max-width: 770px; width: 100%; margin-top: 20px;}
        
        .header-card { 
            background: var(--card-bg); 
            padding: 24px; 
            border-radius: 8px; 
            box-shadow: 0 1px 2px 0 rgba(60,64,67,0.3); 
            margin-bottom: 12px; 
            border-top: 10px solid var(--google-purple);
        }
        
        h1 { font-size: 32px; font-weight: 400; margin: 0 0 12px 0; }
        .subtitle { color: var(--text-secondary); margin: 0 0 24px 0; font-size: 14px; border-bottom: 1px solid var(--border-color); padding-bottom: 24px;}
        
        .card {
            background: var(--card-bg); 
            padding: 24px; 
            border-radius: 8px; 
            box-shadow: 0 1px 2px 0 rgba(60,64,67,0.3); 
            margin-bottom: 12px; 
            border: 1px solid transparent;
            border-left: 0;
            transition: box-shadow 0.2s;
        }
        .card:hover { border-left: 6px solid #4285f4; padding-left: 18px; box-shadow: 0 2px 6px 0 rgba(60,64,67,0.3); }

        .form-group { margin-bottom: 24px; }
        label { display: block; font-weight: 500; margin-bottom: 12px; font-size: 16px;}
        
        input[type="file"], input[type="number"] { 
            width: 100%; 
            padding: 8px 0; 
            border: none;
            border-bottom: 1px solid var(--border-color); 
            background: transparent;
            font-size: 14px;
            color: var(--text-secondary);
            outline: none;
        }
        input[type="number"]:focus { border-bottom: 2px solid var(--google-purple); }
        
        .btn-controls { display: flex; justify-content: space-between; align-items: center; margin-top: 16px; }
        
        button { 
            background-color: var(--google-purple); 
            color: white; 
            border: none; 
            padding: 10px 24px; 
            border-radius: 4px; 
            font-size: 14px; 
            cursor: pointer; 
            font-weight: 500; 
            transition: background-color 0.2s;
        }
        button:hover { background-color: rgb(81, 45, 168); }
        button:disabled { background-color: rgba(0,0,0,0.12); color: rgba(0,0,0,0.26); cursor: default; }
        
        .question-text { font-weight: 400; margin-bottom: 16px; font-size: 16px;}
        .option-label { display: flex; align-items: center; padding: 8px 0; margin-bottom: 4px; cursor: pointer; font-size: 14px;}
        input[type="radio"] { margin-right: 12px; width: 20px; height: 20px; accent-color: var(--google-purple); cursor: pointer;}
        
        .feedback { margin-top: 16px; padding: 12px; border-radius: 4px; font-size: 14px; display: none; font-weight: 500;}
        .feedback.correct { background: #e6f4ea; color: #137333; display: block; }
        .feedback.incorrect { background: #fce8e6; color: #c5221f; display: block; }
        
        #loader { display: none; padding: 24px; text-align: center; color: var(--text-secondary); font-size: 14px;}
        #quiz-container, #results-container { display: none; }
    </style>
</head>
<body>

<div class="container">
    <div class="header-card" id="upload-section">
        <h1>AI Document Quiz Generator</h1>
        <p class="subtitle">Upload a PDF document to generate a custom assessment.</p>
        
        <div class="form-group">
            <label for="pdf-upload">Upload Material (PDF)</label>
            <input type="file" id="pdf-upload" accept="application/pdf">
        </div>
        <div class="form-group">
            <label for="num-questions">Number of Questions (1-10)</label>
            <input type="number" id="num-questions" min="1" max="10" value="3">
        </div>
        <div class="btn-controls">
            <button id="generateBtn" onclick="generateQuiz()">Generate Quiz</button>
        </div>
    </div>

    <div id="loader">Generating questions based on your document... Please wait.</div>

    <div id="quiz-container">
        <div class="card">
            <h2 id="quiz-title">Quiz Title</h2>
            <p style="color: #5f6368; font-size: 14px; margin: 0;">* Indicates required question</p>
        </div>
        <div id="questions-wrapper"></div>
        <div class="btn-controls" style="margin-bottom: 40px;">
            <button id="submitBtn" onclick="gradeQuiz()">Submit</button>
        </div>
    </div>

    <div class="card" id="results-container" style="border-top: 10px solid #137333;">
        <h2 id="final-score" style="font-size: 24px; font-weight: 400; color: #137333; margin: 0 0 12px 0;"></h2>
        <p style="color: var(--text-secondary); margin: 0;">Your response has been recorded. Scroll up to view feedback.</p>
    </div>
</div>

<script>
    let globalQuizData = [];

    async function generateQuiz() {
        const fileInput = document.getElementById('pdf-upload');
        const numQuestions = document.getElementById('num-questions').value;
        
        if (!fileInput.files[0]) return alert("Please select a PDF file first!");

        document.getElementById('generateBtn').disabled = true;
        document.getElementById('loader').style.display = 'block';
        document.getElementById('quiz-container').style.display = 'none';
        document.getElementById('results-container').style.display = 'none';

        const formData = new FormData();
        formData.append("file", fileInput.files[0]);
        formData.append("num_questions", numQuestions);

        try {
            const response = await fetch('http://localhost:8000/generate-quiz', {
                method: 'POST',
                body: formData
            });

            const data = await response.json();
            console.log("Raw AI Data Received:", data); // DEBUGGING LINE

            // Safety check in case the AI hallucinates
            if (!data || !data.questions || !Array.isArray(data.questions)) {
                throw new Error("The AI returned badly formatted data. Please try generating again.");
            }

            globalQuizData = data.questions; 
            document.getElementById('quiz-title').innerText = data.quiz_title || "Generated Quiz";
            
            const wrapper = document.getElementById('questions-wrapper');
            wrapper.innerHTML = globalQuizData.map((q, index) => `
                <div class="card" id="qblock-${q.id}">
                    <div class="question-text">${index + 1}. ${q.question_text} <span style="color: red;">*</span></div>
                    ${q.options.map((opt, optIdx) => `
                        <label class="option-label">
                            <input type="radio" name="q-${q.id}" value="${opt.replace(/"/g, '&quot;')}"> 
                            <span>${opt}</span>
                        </label>
                    `).join('')}
                    <div class="feedback" id="feedback-${q.id}"></div>
                </div>
            `).join('');

            document.getElementById('quiz-container').style.display = 'block';

        } catch (error) {
            console.error("Full Error:", error);
            alert("Error: " + error.message);
        } finally {
            document.getElementById('generateBtn').disabled = false;
            document.getElementById('loader').style.display = 'none';
        }
    }

    async function gradeQuiz() {
        const submitBtn = document.getElementById('submitBtn');
        submitBtn.disabled = true;
        submitBtn.innerText = "Submitting...";

        const submissions = globalQuizData.map(q => {
            const selected = document.querySelector(`input[name="q-${q.id}"]:checked`);
            return {
                question_id: q.id,
                question_text: q.question_text,
                correct_answer: q.correct_answer,
                user_answer: selected ? selected.value : "No answer provided"
            };
        });

        try {
            const response = await fetch('http://localhost:8000/evaluate-answers', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ submissions: submissions })
            });

            const resultData = await response.json();
            console.log("Raw Grading Data Received:", resultData); // DEBUGGING LINE

            if (!resultData || !resultData.feedback) {
                throw new Error("AI failed to grade properly.");
            }

            resultData.feedback.forEach(fb => {
                const feedbackDiv = document.getElementById(`feedback-${fb.question_id}`);
                if (feedbackDiv) {
                    feedbackDiv.innerText = fb.tutor_message;
                    feedbackDiv.className = `feedback ${fb.is_correct ? 'correct' : 'incorrect'}`;
                }
            });

            document.getElementById('final-score').innerText = resultData.score_summary || "Grading Complete";
            document.getElementById('results-container').style.display = 'block';
            submitBtn.style.display = 'none';

        } catch (error) {
            console.error("Full Error:", error);
            alert("Grading Error: " + error.message);
            submitBtn.disabled = false;
            submitBtn.innerText = "Submit";
        }
    }
</script>
</body>
</html>
